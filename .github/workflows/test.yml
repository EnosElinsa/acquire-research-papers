name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv
        run: python -m pip install uv
      - name: Install dependencies
        run: uv sync --locked --all-groups
      - name: Lint
        run: uv run ruff check src tests scripts/validate_skill.py
      - name: Test Python
        run: uv run pytest -q
      - name: Validate skill
        run: uv run python scripts/validate_skill.py .
      - name: Test browser helpers
        if: runner.os == 'Windows'
        run: node --test tests/node/test-ieee-playwright.mjs
      - name: Test credential store
        if: runner.os == 'Windows'
        shell: powershell
        run: ./tests/powershell/test-secret-store.ps1
      - name: Test pinned Playwright installer
        if: runner.os == 'Windows'
        shell: powershell
        run: ./tests/powershell/test-install-playwright.ps1
